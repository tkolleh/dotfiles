tracks:
  - condition: extension is adoc AND phase is pre
    sequence:
      - command: ~/ws/markup-diagram-preprocessors/mermaid-preprocessor/process-mermaid.sc -i $MARKED_PATH -f adoc
      - command: ~/ws/markup-diagram-preprocessors/d2-preprocessor/process-d2.sc -f adoc
  - condition: extension is adoc AND phase is pro
    command: /opt/homebrew/bin/asciidoctor --backend html5 -o - -
  - condition: extension is md AND phase is pre
    sequence:
      - command: ~/ws/markup-diagram-preprocessors/mermaid-preprocessor/process-mermaid.sc -i $MARKED_PATH
      - command: ~/ws/markup-diagram-preprocessors/d2-preprocessor/process-d2.sc
